<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stock Diary</title>
    <link href="/style.css" rel="stylesheet">
</head>
<body>
    <div id="app">
        <!-- Login Page -->
        <div id="login-page" class="page">
            <div class="form-container">
                <h2>Login</h2>
                <form id="login-form">
                    <input type="email" id="login-email" placeholder="Email" required>
                    <input type="password" id="login-password" placeholder="Password" required>
                    <button type="submit">Login</button>
                </form>
                <p>Don't have an account? <a href="#" id="show-signup">Sign Up</a></p>
            </div>
        </div>

        <!-- Signup Page -->
        <div id="signup-page" class="page" style="display: none;">
            <div class="form-container">
                <h2>Sign Up</h2>
                <form id="signup-form">
                    <input type="email" id="signup-email" placeholder="Email" required>
                    <input type="password" id="signup-password" placeholder="Password" required>
                    <input type="password" id="signup-confirm-password" placeholder="Confirm Password" required>
                    <button type="submit">Sign Up</button>
                </form>
                <p>Already have an account? <a href="#" id="show-login">Login</a></p>
            </div>
        </div>

        <!-- Journal Page -->
        <div id="journal-page" class="page" style="display: none;">
            <header>
                <h1>My Stock Diary</h1>
                <button id="logout-btn">Logout</button>
            </header>
            <main>
                <div class="form-container">
                    <form id="journal-form">
                        <input type="text" id="journal-ticker" placeholder="Ticker (e.g., AAPL)" required>
                        <input type="number" id="journal-entry-price" placeholder="Entry Price" step="0.01" required>
                        <input type="number" id="journal-target-price" placeholder="Target Price" step="0.01" required>
                        <textarea id="journal-notes" placeholder="What were your reasons for entering this trade?"></textarea>
                        <button type="submit">Add Entry</button>
                    </form>
                </div>
                <div id="journal-entries">
                    <!-- Entries will be dynamically added here -->
                </div>
            </main>
        </div>
    </div>
    <script defer type="text/javascript" src="/main.js"></script>
</body>
</html>
